<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page Flows Screenshot Gallery</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <button id="backBtn" class="back-btn" hidden>&larr; Back</button>
      <h1 id="pageTitle">Page Flows Gallery</h1>
      <input id="search" type="search" placeholder="Search apps…" />
    </div>
    <div id="breadcrumb" class="breadcrumb"></div>
  </header>

  <main id="main"></main>

  <div id="lightbox" class="lightbox" hidden>
    <button class="lb-close" id="lbClose">&times;</button>
    <button class="lb-nav lb-prev" id="lbPrev">&larr;</button>
    <img id="lbImage" alt="" />
    <button class="lb-nav lb-next" id="lbNext">&rarr;</button>
    <div class="lb-caption" id="lbCaption"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
